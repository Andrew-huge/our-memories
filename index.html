<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我们的回忆录">
<meta name="theme-color" content="#faf8f5">
<meta name="description" content="鑫鑫 & 露露的专属回忆录">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
<title>我们的回忆录 · 鑫鑫 & 露露</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --primary: #c87a2e;
    --primary-light: #fef3e6;
    --primary-dark: #8b5a1f;
    --text: #3d3d3d;
    --text-light: #8c8c8c;
    --border: #e8e3dc;
    --shadow: 0 2px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.07);
    --radius: 18px;
    --radius-sm: 12px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    --safe-bottom: env(safe-area-inset-bottom, 16px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== 背景装饰 ===== */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 85% 15%, rgba(200,122,46,0.03) 0%, transparent 50%),
      radial-gradient(circle at 15% 85%, rgba(200,122,46,0.02) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ===== 主容器 ===== */
  .app { max-width: 640px; margin: 0 auto; padding: 16px 16px calc(80px + var(--safe-bottom)); position: relative; z-index: 1; }

  /* ===== 顶部标题 ===== */
  .header { text-align: center; padding: 32px 16px 22px; }
  .header .icon-row { font-size: 42px; margin-bottom: 4px; animation: float 3s ease-in-out infinite; display: inline-block; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .header h1 {
    font-size: 1.7em; font-weight: 800; color: var(--text); margin-bottom: 4px;
  }
  .header h1 span { color: var(--primary); }
  .header .subtitle { color: var(--text-light); font-size: 0.88em; }

  /* ===== 在一起天数 ===== */
  .days-counter {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin: 0 auto 20px; padding: 16px 24px;
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    max-width: 360px; cursor: pointer; transition: var(--transition);
    border: 1px solid var(--border); -webkit-tap-highlight-color: transparent;
  }
  .days-counter:active { border-color: var(--primary); transform: scale(0.98); }
  .days-counter .heart { font-size: 26px; animation: heartbeat 1.2s ease-in-out infinite; }
  @keyframes heartbeat { 0%,100%{transform:scale(1)} 15%{transform:scale(1.25)} 30%{transform:scale(1)} 45%{transform:scale(1.15)} 60%{transform:scale(1)} }
  .days-counter .count { font-size: 1.8em; font-weight: 700; color: var(--primary); }
  .days-counter .label { color: var(--text-light); font-size: 0.82em; }

  /* ===== 操作栏 ===== */
  .action-bar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 18px; }

  .btn {
    padding: 11px 20px; border: none; border-radius: 50px; font-size: 0.9em;
    cursor: pointer; transition: var(--transition); font-weight: 600;
    display: flex; align-items: center; gap: 5px; font-family: inherit;
    min-height: 44px; -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--primary); color: white;
    box-shadow: 0 4px 14px rgba(200,122,46,0.22);
  }
  .btn-outline {
    background: var(--card); color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

  /* ===== 日历面板 ===== */
  .calendar-panel {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px; margin-bottom: 18px; display: none; animation: fadeIn 0.25s ease;
    border: 1px solid var(--border);
  }
  .calendar-panel.show { display: block; }
  .calendar-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .calendar-header .month-label { font-size: 1.1em; font-weight: 700; color: var(--text); }
  .calendar-header .nav-btn {
    width: 40px; height: 40px; border: none; border-radius: 50%;
    background: var(--primary-light); color: var(--primary);
    cursor: pointer; font-size: 1em; transition: var(--transition);
    font-family: inherit; display: flex; align-items: center; justify-content: center;
  }
  .calendar-header .nav-btn:active { background: var(--primary); color: white; }

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .calendar-grid .day-header { font-size: 0.75em; font-weight: 600; color: var(--text-light); padding: 6px 0; }
  .calendar-grid .day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; cursor: pointer; font-size: 0.85em; transition: var(--transition);
    position: relative; min-width: 36px; min-height: 36px;
  }
  .calendar-grid .day:active { background: var(--primary-light); }
  .calendar-grid .day.today { border: 2px solid var(--primary-dark); font-weight: 700; }
  .calendar-grid .day.has-photo { background: var(--primary-light); font-weight: 600; color: var(--primary-dark); }
  .calendar-grid .day.has-photo::after {
    content: ''; position: absolute; bottom: 2px; width: 4px; height: 4px;
    background: var(--primary); border-radius: 50%;
  }
  .calendar-grid .day.selected { background: var(--primary); color: white; }
  .calendar-grid .day.selected::after { background: white; }
  .calendar-grid .day.empty { cursor: default; }
  .calendar-grid .day.empty:active { background: transparent; }

  /* ===== 添加照片表单 ===== */
  .add-form {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 22px; margin-bottom: 18px; display: none; animation: fadeIn 0.25s ease;
    border: 1.5px dashed var(--border);
  }
  .add-form.show { display: block; }
  .add-form h3 { text-align: center; color: var(--text); margin-bottom: 16px; font-size: 1.05em; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: var(--text); font-size: 0.85em; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 16px;
    transition: var(--transition); background: var(--bg); font-family: inherit;
    -webkit-appearance: none; appearance: none; color: var(--text);
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(200,122,46,0.06);
  }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .form-group .image-preview {
    width: 100%; max-height: 220px; object-fit: cover;
    border-radius: var(--radius-sm); margin-top: 8px; display: none;
  }
  .form-group .file-upload-area {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 16px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
    cursor: pointer; transition: var(--transition); background: var(--bg);
    gap: 6px; text-align: center;
  }
  .form-group .file-upload-area:active { border-color: var(--primary); background: var(--primary-light); }
  .form-group .file-upload-area .upload-icon { font-size: 36px; }
  .form-group .file-upload-area .upload-text { font-size: 0.85em; color: var(--text-light); }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  /* ===== 筛选标签 ===== */
  .filter-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; justify-content: center; }
  .filter-tag {
    padding: 8px 16px; border-radius: 50px; font-size: 0.82em; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--card); color: var(--text-light);
    transition: var(--transition); font-family: inherit; min-height: 36px;
  }
  .filter-tag:active { border-color: var(--primary); color: var(--primary); }
  .filter-tag.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* ===== 照片网格 ===== */
  .photo-grid { display: flex; flex-direction: column; gap: 14px; }

  .photo-card {
    background: var(--card); border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); transition: var(--transition); position: relative;
    border: 1px solid var(--border);
  }
  .photo-card:active { transform: scale(0.99); }

  .photo-card .img-wrap {
    width: 100%; position: relative; overflow: hidden;
    aspect-ratio: 4/3; background: #f5f4f0;
  }
  .photo-card img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }
  .photo-card:active img { transform: scale(1.03); }

  .photo-card .img-wrap .date-badge {
    position: absolute; top: 10px; right: 10px;
    background: rgba(255,255,255,0.94); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    padding: 5px 12px; border-radius: 50px; font-size: 0.78em;
    font-weight: 600; color: var(--primary-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .photo-card .info { padding: 14px; }
  .photo-card .info .desc { font-size: 0.9em; line-height: 1.5; color: var(--text); word-break: break-word; }
  .photo-card .info .meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; font-size: 0.78em; color: var(--text-light);
  }
  .photo-card .delete-btn {
    width: 40px; height: 40px; border: none; border-radius: 50%;
    background: #f5f4f0; color: #b0a89e; cursor: pointer; font-size: 1.1em;
    transition: var(--transition); font-family: inherit; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-card .delete-btn:active { background: #e8e3dc; color: #8c7b6b; transform: scale(1.1); }

  /* ===== 空状态 ===== */
  .empty-state { text-align: center; padding: 48px 16px; animation: fadeIn 0.5s ease; }
  .empty-state .icon { font-size: 72px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; display: inline-block; }
  .empty-state h3 { color: var(--text-light); font-size: 1.05em; margin-bottom: 6px; }
  .empty-state p { color: #b0a89e; font-size: 0.85em; }

  /* ===== 底部悬浮按钮 ===== */
  .fab {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); right: 20px; z-index: 50;
    width: 54px; height: 54px; border-radius: 50%; border: none;
    background: var(--primary); color: white; font-size: 26px; cursor: pointer;
    box-shadow: 0 6px 24px rgba(200,122,46,0.3);
    transition: var(--transition); display: flex; align-items: center; justify-content: center;
  }
  .fab:active { transform: scale(0.9); box-shadow: 0 4px 14px rgba(200,122,46,0.2); }
  @media (min-width: 769px) { .fab { display: none; } }

  /* ===== Toast ===== */
  .toast {
    position: fixed; top: calc(20px + var(--safe-top)); left: 50%; transform: translateX(-50%);
    background: rgba(60,60,60,0.92); color: white; padding: 10px 22px;
    border-radius: 50px; font-size: 0.85em; z-index: 200;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
  }
  .toast.show { opacity: 1; }

  /* ===== 弹窗 ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    z-index: 100; display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  .modal {
    background: var(--card); border-radius: var(--radius); padding: 24px;
    max-width: 380px; width: 100%; text-align: center; animation: fadeInUp 0.3s ease;
  }
  .modal h3 { color: var(--text); margin-bottom: 10px; font-size: 1.1em; }
  .modal p { color: var(--text-light); margin-bottom: 18px; line-height: 1.6; font-size: 0.9em; }
  .modal input {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 16px; text-align: center;
    margin-bottom: 14px; font-family: inherit; -webkit-appearance: none; background: var(--bg);
  }
  .modal input:focus { outline: none; border-color: var(--primary); }
  .modal .btn { width: 100%; justify-content: center; }

  /* ===== 提示条 ===== */
  .storage-warning {
    background: #fdf8ed; color: #8b6d2e; text-align: center;
    padding: 10px 16px; border-radius: var(--radius-sm); margin-bottom: 16px;
    font-size: 0.8em; display: none; line-height: 1.5;
    border: 1px solid #f0e0b8;
  }
  .storage-warning.show { display: block; }

  /* ===== 统计面板 ===== */
  .stats-panel {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 22px; margin-bottom: 18px; display: none; animation: fadeIn 0.25s ease;
    border: 1px solid var(--border);
  }
  .stats-panel.show { display: block; }
  .stats-panel h3 { text-align: center; font-size: 1.05em; margin-bottom: 16px; color: var(--text); }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-item {
    text-align: center; padding: 14px 8px; background: var(--bg);
    border-radius: var(--radius-sm);
  }
  .stat-item .stat-num { font-size: 1.6em; font-weight: 700; color: var(--primary); display: block; }
  .stat-item .stat-label { font-size: 0.72em; color: var(--text-light); margin-top: 2px; }

  .stats-month-list { max-height: 200px; overflow-y: auto; }
  .stats-month-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid #f5f4f0;
  }
  .stats-month-row:last-child { border-bottom: none; }
  .stats-month-row .month-label { width: 60px; font-size: 0.82em; font-weight: 600; color: var(--text); flex-shrink: 0; }
  .stats-month-row .month-bar-wrap { flex: 1; height: 10px; background: #f5f4f0; border-radius: 5px; overflow: hidden; }
  .stats-month-row .month-bar { height: 100%; background: var(--primary); border-radius: 5px; transition: width 0.5s ease; }
  .stats-month-row .month-count { width: 28px; text-align: right; font-size: 0.78em; color: var(--text-light); flex-shrink: 0; }

  /* ===== 照片灯箱 ===== */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.94);
    z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center;
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  }
  .lightbox.show { display: flex; }

  .lightbox .lightbox-img-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%; overflow: hidden; position: relative;
    touch-action: pan-y pinch-zoom;
  }
  .lightbox img {
    max-width: 100%; max-height: 70vh;
    object-fit: contain; transition: transform 0.15s ease-out;
    -webkit-user-drag: none;
  }
  .lightbox .lightbox-close {
    position: fixed; top: calc(14px + var(--safe-top)); right: 14px; z-index: 301;
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.12); color: white; font-size: 1.2em;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit;
  }
  .lightbox .lightbox-close:active { background: rgba(255,255,255,0.25); }

  .lightbox .lightbox-nav {
    position: fixed; top: 50%; transform: translateY(-50%); z-index: 301;
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.12); color: white; font-size: 1.3em;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit;
  }
  .lightbox .lightbox-nav:active { background: rgba(255,255,255,0.25); }
  .lightbox .lightbox-prev { left: 10px; }
  .lightbox .lightbox-next { right: 10px; }

  .lightbox .lightbox-info {
    padding: 14px 20px calc(14px + var(--safe-bottom));
    text-align: center; width: 100%;
  }
  .lightbox .lightbox-info .lightbox-date { color: rgba(255,255,255,0.8); font-size: 0.85em; font-weight: 600; }
  .lightbox .lightbox-info .lightbox-desc { color: rgba(255,255,255,0.55); font-size: 0.8em; margin-top: 4px; }
  .lightbox .lightbox-counter { color: rgba(255,255,255,0.4); font-size: 0.75em; }

  /* ===== 页脚 ===== */
  .footer { text-align: center; padding: 28px 16px; color: #c5bfb5; font-size: 0.8em; }

  /* ===== 动画 ===== */
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  /* ===== 桌面端适配 ===== */
  @media (min-width: 769px) {
    .app { padding-bottom: 40px; }
    .header h1 { font-size: 2em; }
    .header .icon-row { font-size: 52px; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .photo-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .photo-card:hover img { transform: scale(1.05); }
    .photo-card:active { transform: scale(0.99); }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 头部 -->
  <div class="header">
    <div class="icon-row">📷</div>
    <h1>我们的<span>回忆录</span></h1>
    <p class="subtitle">记录属于鑫鑫 & 露露的每一个美好瞬间</p>
  </div>

  <!-- 在一起天数 -->
  <div class="days-counter" id="daysCounter" onclick="openAnniversaryModal()">
    <span class="heart">❤️</span>
    <div>
      <div class="count" id="daysCount">--</div>
      <div class="label">我们已经在一起</div>
    </div>
  </div>
  <div style="text-align:center;margin-top:-8px;margin-bottom:12px;font-size:0.75em;color:#c5bfb5;">—— 鑫鑫 & 露露</div>

  <!-- 操作按钮 -->
  <div class="action-bar">
    <button class="btn btn-primary" onclick="toggleAddForm()">📸 添加</button>
    <button class="btn btn-outline" id="calendarBtn" onclick="toggleCalendar()">📅 日历</button>
    <button class="btn btn-outline" id="statsBtn" onclick="toggleStats()">📊 统计</button>
    <button class="btn btn-outline" onclick="openAnniversaryModal()">❤️ 纪念日</button>
  </div>

  <!-- 存储警告 -->
  <div class="storage-warning" id="storageWarning">存储空间紧张，建议清理部分旧照片</div>

  <!-- 添加照片表单 -->
  <div class="add-form" id="addForm">
    <h3>记录美好瞬间</h3>
    <div class="form-group">
      <label>📸 选择照片</label>
      <div class="file-upload-area" onclick="document.getElementById('photoInput').click()" id="uploadArea">
        <span class="upload-icon">📷</span>
        <span class="upload-text">从相册选择或拍照</span>
        <span style="font-size:0.7em;color:#b0a89e;">点击后选择相册或相机</span>
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="previewImage(event)" class="visually-hidden">
      <img class="image-preview" id="imagePreview">
    </div>
    <div class="form-group">
      <label>📅 拍摄日期</label>
      <input type="date" id="photoDate">
    </div>
    <div class="form-group">
      <label>💬 想说的话（可选）</label>
      <textarea id="photoDesc" placeholder="记录这一刻的心情..." maxlength="200"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="toggleAddForm()">取消</button>
      <button class="btn btn-primary" onclick="addPhoto()">保存回忆</button>
    </div>
  </div>

  <!-- 日历 -->
  <div class="calendar-panel" id="calendarPanel">
    <div class="calendar-header">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div style="text-align:center;margin-top:10px;">
      <button class="btn btn-outline" style="padding:6px 16px;font-size:0.78em;" onclick="goToToday()">回到今天</button>
    </div>
  </div>

  <!-- 统计面板 -->
  <div class="stats-panel" id="statsPanel">

<script>
  // ===== Supabase 云存储 + 本地缓存 =====
  const SUPABASE_URL = 'https://jekbbyrrbgroerureiym.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla2JieXJyYmdyb2VydXJlaXltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzQxODYsImV4cCI6MjA5NzcxMDE4Nn0.rYHdp3m5Va6sm9Nd5XxqcsrW5AoSKbS2QoItRtH0fqM';

  function apiHeaders() {

  // 本地缓存读写

  async function apiGetPhotos() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?select=*&order=date.desc,created_at.desc`, { headers: apiHeaders() });
    if (!res.ok) throw new Error('查询失败');
    const rows = await res.json();
    return rows.map(r => ({ id: r.id, dataUrl: r.data, date: r.date, desc: r.desc_text || '', createdAt: r.created_at }));

  async function apiUploadImage(blob, filename) {
    const form = new FormData(); form.append('file', blob, filename);
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/photos/${filename}`, {
      method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }, body: form
    });
    if (!res.ok) throw new Error('上传失败');
    return `${SUPABASE_URL}/storage/v1/object/public/photos/${filename}`;
  }

  async function apiAddPhoto(photo) {
    const body = { id: photo.id, data: photo.dataUrl, date: photo.date, desc_text: photo.desc || '' };
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos`, {
      method: 'POST', headers: { ...apiHeaders(), 'Prefer': 'return=representation' }, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('添加失败');
  }

  async function apiDeletePhoto(id, url) {
    await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE', headers: apiHeaders() });
    if (url) {
      const fn = url.split('/').pop();
      if (fn) { await fetch(`${SUPABASE_URL}/storage/v1/object/photos/${fn}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }).catch(()=>{}); }
    }
  }

  async function apiGetMeta(key) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/meta?key=eq.${encodeURIComponent(key)}&select=value`, { headers: apiHeaders() });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.length > 0 ? rows[0].value : null;
  }

  async function apiUpdatePhoto(id, date, desc) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH', headers: { ...apiHeaders(), 'Prefer': 'return=representation' },

  }

  async function apiSetMeta(key, value) {

    await fetch(`${SUPABASE_URL}/rest/v1/meta`, {
      method: 'POST', headers: { ...apiHeaders(), 'Prefer': 'return=representation' }, body: JSON.stringify({ key, value })

  }

  // ===== Toast =====

  // ===== 纪念日（云端存储） =====

  // ===== 日历 =====
  let calendarYear, calendarMonth, selectedCalendarDate = null;

  function toggleCalendar() {

    const panel = document.getElementById('calendarPanel'), btn = document.getElementById('calendarBtn');

    calendarMonth += delta;

    if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
    renderCalendar();

  let cachedPhotos = [];
  async function renderCalendar() {
    document.getElementById('monthLabel').textContent = `${calendarYear} 年 ${calendarMonth + 1} 月`;
    const grid = document.getElementById('calendarGrid');
    const photoDates = new Set(cachedPhotos.map(p => p.date));

    let html = headers.map(h => `<div class="day-header">${h}</div>`).join('');
    const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();

    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';
    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      let cls = 'day';
      if (dateStr === todayStr) cls += ' today';

      if (dateStr === selectedCalendarDate) cls += ' selected';
      html += `<div class="${cls}" onclick="selectCalendarDate('${dateStr}')">${d}</div>`;

    grid.innerHTML = html;
  }
  function selectCalendarDate(dateStr) {
    selectedCalendarDate = dateStr; renderCalendar(); renderPhotos();
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  }

  // ===== 添加照片 =====
  let imageDataUrl = null;  // 预览用 dataUrl
  let imageBlob = null;     // 上传用 blob

  function toggleAddForm() {
    const form = document.getElementById('addForm');

    else {
      const today = new Date();

  }

  function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { showToast('图片太大啦，请选择 5MB 以内的照片'); event.target.value = ''; return; }
    compressImage(file, 1600).then(({ dataUrl, blob }) => {
      imageDataUrl = dataUrl;
      imageBlob = blob;
      const preview = document.getElementById('imagePreview');
      preview.src = imageDataUrl; preview.style.display = 'block';
      document.getElementById('uploadArea').style.display = 'none';
    });
  }

  function compressImage(file, maxDim) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          let w = img.width, h = img.height;
          const needsResize = (w > maxDim || h > maxDim);
          if (needsResize) {
            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          // 小图片用较高画质，否则 0.75
          const quality = file.size < 512 * 1024 ? 0.85 : 0.7;
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          // canvas.toBlob 拿 blob
          canvas.toBlob(b => {
            resolve({ dataUrl, blob: b || new Blob([]) });
          }, 'image/jpeg', quality);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function resetForm() {
    document.getElementById('photoInput').value = '';
    document.getElementById('photoDate').value = '';
    document.getElementById('photoDesc').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('uploadArea').style.display = '';

    imageBlob = null;
  }

    try {
      // 1. 上传图片文件到 Storage
      const publicUrl = await apiUploadImage(imageBlob, filename);
      // 2. 保存记录（只存 URL，不存 base64）
      await apiAddPhoto({ id, dataUrl: publicUrl, date, desc });
      resetForm(); toggleAddForm(); await refreshData(); showToast('回忆已保存 💕');
    } catch(e) {
      showToast('网络错误，请稍后重试');
    }
  }

  async function deletePhoto(id) {
    if (!confirm('真的忍心删掉他们吗 v-v')) return;
    try {
      const photo = cachedPhotos.find(p => p.id === id);
      const url = photo ? photo.dataUrl : '';

  }

  // ===== 编辑照片 =====
  let editingId = null;
  function openEditModal(id) {
    const photo = cachedPhotos.find(p => p.id === id);

    document.getElementById('editDate').value = photo.date;

  // ===== 筛选 =====
  let currentFilter = 'all';
  function filterPhotos(filter, btnEl) {
    currentFilter = filter; selectedCalendarDate = null;
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active'); else document.querySelector('.filter-tag').classList.add('active');
    renderPhotos();
  }
  function getFilteredPhotos() {
    let photos = [...cachedPhotos];
    photos.sort((a,b) => b.date.localeCompare(a.date) || b.createdAt.localeCompare(a.createdAt));
    if (selectedCalendarDate) return photos.filter(p => p.date === selectedCalendarDate);
    const today = new Date(); today.setHours(0,0,0,0);
    switch (currentFilter) {
      case 'year': { const y = new Date(today.getFullYear(),0,1); return photos.filter(p => new Date(p.date+'T00:00:00') >= y); }
      case 'month': { const m = new Date(today.getFullYear(),today.getMonth(),1); return photos.filter(p => new Date(p.date+'T00:00:00') >= m); }
      case 'week': {
        const dw = today.getDay()||7; const ws = new Date(today); ws.setDate(today.getDate()-dw+1);
        return photos.filter(p => new Date(p.date+'T00:00:00') >= ws);
      }
      default: return photos;
    }
  }

  // ===== 渲染 =====
  async function renderPhotos() {
    const grid = document.getElementById('photoGrid'), photos = getFilteredPhotos();
    if (photos.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">${selectedCalendarDate?'🔍':'📷'}</div><h3>${selectedCalendarDate?selectedCalendarDate+' 没有照片':'还没有照片哦'}</h3><p>${selectedCalendarDate?'试试其他日期吧~':'点击下方 + 按钮开始记录吧'}</p></div>`;
      return;
    }
    grid.innerHTML = photos.map(p => {
      const d = new Date(p.date+'T00:00:00');
      const ds = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
      const wd = ['日','一','二','三','四','五','六'][d.getDay()];
      return `<div class="photo-card">
        <div class="img-wrap" onclick="openLightbox('${p.id}')"><img src="${p.dataUrl || p.data}" alt="回忆" loading="lazy" decoding="async"><span class="date-badge">📅 ${ds} 周${wd}</span></div>
        <div class="info">${p.desc?`<div class="desc">💬 ${escapeHtml(p.desc)}</div>`:''}
          <div class="meta"><span>${formatTimeAgo(p.createdAt)}</span><div style="display:flex;gap:6px;"><button class="delete-btn" onclick="event.stopPropagation();openEditModal('${p.id}')" title="编辑" style="font-size:0.9em;">✏️</button><button class="delete-btn" onclick="event.stopPropagation();deletePhoto('${p.id}')" title="删除">🗑</button></div></div>
        </div></div>`;
    }).join('');
  }
  function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
  function formatTimeAgo(iso) {
    const diff = new Date()-new Date(iso), mins=Math.floor(diff/60000);
    if (mins<1) return '刚刚'; if (mins<60) return `${mins} 分钟前`;
    const hrs=Math.floor(mins/60); if (hrs<24) return `${hrs} 小时前`;
    const days=Math.floor(hrs/24); if (days<30) return `${days} 天前`;
    const mos=Math.floor(days/30); if (mos<12) return `${mos} 个月前`;
    return `${Math.floor(mos/12)} 年前`;
  }

  // ===== 照片灯箱 =====
  let lightboxPhotos = [], lightboxIndex = -1;
  let touchStartX = 0, touchStartY = 0, touchMoved = false;

  function openLightbox(id) {

    document.getElementById('lightbox').classList.add('show');
    document.body.style.overflow = 'hidden';

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');

    lightboxPhotos = []; lightboxIndex = -1;
  }
  function lightboxNav(dir) {
    if (lightboxPhotos.length === 0) return;
    lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
    showLightboxSlide();
  }
  function showLightboxSlide() {

    document.getElementById('lightboxDesc').textContent = p.desc || '';
    document.getElementById('lightboxCounter').textContent = `${lightboxIndex + 1} / ${lightboxPhotos.length}`;
  }

  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('show')) return;

  document.getElementById('lightboxImgWrap').addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; touchMoved = false;
  }, { passive: true });
  document.getElementById('lightboxImgWrap').addEventListener('touchmove', function(e) {
    touchMoved = true;
    const dx = e.touches[0].clientX - touchStartX;
    document.getElementById('lightboxImg').style.transform = `translateX(${dx * 0.3}px)`;
  }, { passive: true });
  document.getElementById('lightboxImgWrap').addEventListener('touchend', function(e) {
    document.getElementById('lightboxImg').style.transform = '';
    if (!touchMoved) { closeLightbox(); return; }
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) { lightboxNav(dx > 0 ? -1 : 1); }
  });

  // ===== 统计面板 =====

  function renderStats() {

    const totalPhotos = photos.length;
    const today = new Date(); today.setHours(0,0,0,0);
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    const thisMonth = photos.filter(p => new Date(p.date+'T00:00:00') >= monthStart).length;
    const uniqueDays = new Set(photos.map(p => p.date)).size;
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-item"><span class="stat-num">${totalPhotos}</span><span class="stat-label">总照片</span></div>
      <div class="stat-item"><span class="stat-num">${thisMonth}</span><span class="stat-label">本月新增</span></div>
      <div class="stat-item"><span class="stat-num">${uniqueDays}</span><span class="stat-label">记录天数</span></div>
    `;
    const monthMap = {};
    photos.forEach(p => {
      const key = p.date.substring(0, 7);
      monthMap[key] = (monthMap[key] || 0) + 1;
    });
    const months = Object.entries(monthMap).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 12);
    const maxCount = Math.max(...months.map(m => m[1]), 1);
    if (months.length === 0) {
      document.getElementById('statsMonthList').innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;font-size:0.85em;">还没有照片哦 📷</div>';
    } else {
      document.getElementById('statsMonthList').innerHTML = months.map(([key, count]) => {
        const [y, m] = key.split('-');
        const pct = Math.round((count / maxCount) * 100);
        return `<div class="stats-month-row"><span class="month-label">${y}年${parseInt(m)}月</span><span class="month-bar-wrap"><span class="month-bar" style="width:${pct}%"></span></span><span class="month-count">${count}</span></div>`;
      }).join('');
    }
    renderPhotos();
  }

  // ===== 同步 & 初始化 =====
  async function refreshData(silent) {
    try {
      const photos = await apiGetPhotos();
      const old = JSON.stringify(cachedPhotos);
      cachedPhotos = photos;
      saveCache(photos); // 更新本地缓存
      await renderPhotos();
      if (document.getElementById('calendarPanel').classList.contains('show')) renderCalendar();
      if (document.getElementById('statsPanel').classList.contains('show')) renderStats();
      if (!silent && JSON.stringify(photos) !== old) showToast('已同步最新数据 🔄');
    } catch(e) {
      // 云端挂了，用缓存兜底
      if (!silent) showToast('网络不佳，显示缓存数据');
    }
  }

  // 后台静默刷新
  function bgSync() {
    apiGetPhotos().then(photos => {
      if (JSON.stringify(photos) !== JSON.stringify(cachedPhotos)) {
        cachedPhotos = photos;
        saveCache(photos);
        renderPhotos();
      }
    }).catch(()=>{});
  }
  setInterval(bgSync, 15000);
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') bgSync(); });

  async function init() {
    // 1. 先展示缓存（秒开）
    cachedPhotos = loadCache();
    await loadAnniversary();
    initCalendar();
    await renderPhotos();
    // 2. 后台拉云端最新数据（首次打开或缓存超时）
    const ct = parseInt(localStorage.getItem(CACHE_TIME_KEY) || '0');
    if (cachedPhotos.length === 0 || Date.now() - ct > CACHE_TTL) {
      bgSync();
    }
    const today = new Date();
    document.getElementById('photoDate').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  }
  document.getElementById('anniversaryModal').addEventListener('click', function(e) { if (e.target===this) closeAnniversaryModal(); });
  document.getElementById('editModal').addEventListener('click', function(e) { if (e.target===this) closeEditModal(); });
  document.getElementById('toast').addEventListener('click', function() { this.classList.remove('show'); });
  init();
</script>
